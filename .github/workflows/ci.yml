name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate configuration
        run: python -m awa05.config

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python modules
        run: python -m compileall -q awa05 scripts tests

      - name: Verify upload dry-run path
        run: AWA05_DRY_RUN=true python -m awa05.upload.github

      - name: Check diff whitespace
        run: git diff --check
